// ── API Client (always talks to local backend) ─────────────────────
const API = "http://localhost:8080/api";
const WS_URL = "ws://localhost:8080/api/ws/logs";

async function api(path, options = {}) {
  const token = localStorage.getItem("lattice_token");
  const res = await fetch(`${API}${path}`, {
    ...options,
    headers: {
      "Content-Type": "application/json",
      ...(token ? { Authorization: `Bearer ${token}` } : {}),
      ...(options.headers || {}),
    },
    body: options.body ? JSON.stringify(options.body) : undefined,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: "Request failed" }));
    throw new Error(err.detail || "Request failed");
  }
  return res.json();
}

// ── Connection status checker ───────────────────────────────────────
function useBackendStatus() {
  const [connected, setConnected] = useState(false);
  useEffect(() => {
    const check = async () => {
      try {
        await fetch(`${API}/bot/status`, { method: "GET" });
        setConnected(true);
      } catch { setConnected(false); }
    };
    check();
    const iv = setInterval(check, 10000);
    return () => clearInterval(iv);
  }, []);
  return connected;
}

// ── Plant Equity Curve ──────────────────────────────────────────────
function PlantEquityCurve({ data, height = 280 }) {
  const [hover, setHover] = useState(null);
  if (!data || data.length < 2) return (<div style={{color:"#475569",fontSize:12,padding:20,textAlign:"center"}}>Not enough data yet</div>);
  const W = 600, H = height, pad = { t: 30, r: 20, b: 35, l: 55 };
  const w = W - pad.l - pad.r, h = H - pad.t - pad.b;
  const vals = data.map(d => d.balance);
  const mn = Math.min(...vals) - 10, mx = Math.max(...vals) + 10;
  const sx = i => pad.l + (i / (data.length - 1)) * w;
  const sy = v => pad.t + (1 - (v - mn) / (mx - mn)) * h;
  const pts = data.map((d, i) => ({ x: sx(i), y: sy(d.balance), ...d, i }));
  const startV = data[0].balance;
  const hp2 = b => Math.max(0, Math.min(1, 0.5 + ((b - startV) / startV) * 10));
  const clr = hl => { const r = Math.round(120 - hl * 91), g = Math.round(80 + hl * 145), b2 = Math.round(50 + hl * 117); return `rgb(${r},${g},${b2})`; };
  const groundY = pad.t + h + 5;
  const segs = [], lvs = [];
  for (let i = 1; i < pts.length; i++) {
    const hl = hp2(data[i].balance), c = clr(hl);
    const cx = (pts[i-1].x + pts[i].x) / 2;
    segs.push(<path key={i} d={`M${pts[i-1].x} ${pts[i-1].y} C${cx} ${pts[i-1].y} ${cx} ${pts[i].y} ${pts[i].x} ${pts[i].y}`} stroke={c} strokeWidth={1.5 + hl} fill="none" strokeLinecap="round" opacity={0.4 + hl * 0.5}/>);
    const up = pts[i].y < pts[i-1].y;
    const sz = 5 + hl * 10, px = pts[i].x, py = pts[i].y, hw2 = sz * 0.4;
    if (up) {
      lvs.push(<path key={i} d={`M${px},${py} C${px-hw2},${py-sz*0.4} ${px-hw2},${py-sz*0.7} ${px},${py-sz} C${px+hw2},${py-sz*0.7} ${px+hw2},${py-sz*0.4} ${px},${py}Z`} fill={c} opacity={0.3 + hl * 0.6}/>);
    } else {
      lvs.push(<path key={i} d={`M${px},${py} C${px-hw2},${py+sz*0.4} ${px-hw2},${py+sz*0.7} ${px},${py+sz} C${px+hw2},${py+sz*0.7} ${px+hw2},${py+sz*0.4} ${px},${py}Z`} fill={c} opacity={0.3 + hl * 0.5}/>);
    }
  }
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} onMouseLeave={() => setHover(null)}>
      {Array.from({length:5},(_,i)=>{ const v=mn+(mx-mn)*(i/4), y=sy(v); return <g key={i}><line x1={pad.l} y1={y} x2={pad.l+w} y2={y} stroke="#1e293b" strokeWidth="0.5"/><text x={pad.l-8} y={y+4} textAnchor="end" fill="#475569" fontSize="10" fontFamily="inherit">${Math.round(v)}</text></g>; })}
      {pts.filter((_,i)=>i%(Math.ceil(pts.length/6))===0||i===pts.length-1).map((p,i)=><text key={i} x={p.x} y={pad.t+h+20} textAnchor="middle" fill="#475569" fontSize="10" fontFamily="inherit">{p.date}</text>)}
      <line x1={pad.l} y1={groundY} x2={pad.l+w} y2={groundY} stroke="#1D9E75" strokeWidth="0.5" opacity="0.15"/>
      <path d={`M${pts[0].x},${pts[0].y} L${pts[0].x},${groundY}`} stroke="#1D9E75" strokeWidth="1" fill="none" opacity="0.2" strokeLinecap="round"/>
      <path d={`M${pts[0].x},${groundY} C${pts[0].x-8},${groundY+5} ${pts[0].x-14},${groundY+6} ${pts[0].x-18},${groundY+4}`} stroke="#1D9E75" strokeWidth="0.6" fill="none" opacity="0.15"/>
      <path d={`M${pts[0].x},${groundY} C${pts[0].x+6},${groundY+5} ${pts[0].x+10},${groundY+7} ${pts[0].x+14},${groundY+5}`} stroke="#1D9E75" strokeWidth="0.6" fill="none" opacity="0.12"/>
      {segs}{lvs}
      {pts.map((p,i)=> <circle key={i} cx={p.x} cy={p.y} r={1.5} fill={clr(hp2(data[i].balance))} opacity={0.4} style={{cursor:"pointer"}} onMouseEnter={()=>setHover(p)}/>)}
      {hover&&<g>
        <line x1={hover.x} y1={pad.t} x2={hover.x} y2={pad.t+h} stroke="#38bdf8" strokeWidth="0.5" opacity="0.3" strokeDasharray="3 3"/>
        <rect x={hover.x+10} y={hover.y-36} width={120} height={30} rx="6" fill="#0f1923" stroke="rgba(56,189,248,0.2)" strokeWidth="0.5"/>
        <text x={hover.x+20} y={hover.y-22} fill="#e2e8f0" fontSize="11" fontFamily="inherit">{hover.date}</text>
        <text x={hover.x+20} y={hover.y-10} fill={hover.balance>=startV?"#34d399":"#f87171"} fontSize="12" fontFamily="inherit" fontWeight="500">${hover.balance.toFixed(2)}</text>
      </g>}
    </svg>
  );
}

// ── Sign In ─────────────────────────────────────────────────────────
function SignIn({onLogin,onBack}) {
  const [u,sU]=useState(""), [p,sP]=useState(""), [ld,sL]=useState(false), [err,sE]=useState("");
  const go = async () => {
    sL(true); sE("");
    try {
      const res = await api("/auth/login", { method: "POST", body: { username: u, password: p } });
      localStorage.setItem("lattice_token", res.token);
      localStorage.setItem("lattice_user", JSON.stringify(res));
      onLogin(res);
    } catch (e) { sE(e.message); }
    sL(false);
  };
  return (<div style={PAGE_BG}><div style={CARD}>
    <div style={{textAlign:"center",marginBottom:28}}><LatticeLogo/></div>
    {err && <div style={{color:"#f87171",fontSize:12,textAlign:"center",marginBottom:16}}>{err}</div>}
    <div style={{marginBottom:20}}><label style={LBL}>USERNAME</label><input value={u} onChange={e=>sU(e.target.value)} style={INP} placeholder="jake"/></div>
    <div style={{marginBottom:28}}><label style={LBL}>PASSWORD</label><input value={p} onChange={e=>sP(e.target.value)} type="password" style={INP} onKeyDown={e=>e.key==="Enter"&&go()}/></div>
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      <Btn1 onClick={go} disabled={ld||!u||!p}>{ld?"CONNECTING...":"SIGN IN"}</Btn1>
      <BtnBack onClick={onBack}/>
    </div>
  </div></div>);
}

// ── Create Account ──────────────────────────────────────────────────
function Setup({onDone,onBack}) {
  const [step,sS]=useState(1);
  const [nm,sN]=useState(""),[un,sU]=useState(""),[pw,sP]=useState("");
  const [at,sAT]=useState("live"),[cm,sCM]=useState("lite"),[am,sAM]=useState("cash");
  const [cks,sCK]=useState([]),[vl,sVL]=useState(false),[vd,sVD]=useState(false),[err,sE]=useState("");

  const VS=[{l:"TWS connection",d:"Port "+(at==="live"?"7496":"7497"),k:"c"},{l:"API enabled",d:"Socket clients + trusted IPs",k:"a"},{l:"Account type",k:"t"},{l:"Trading permissions",d:"US stocks",k:"p"},{l:"Commission plan",k:"m"},{l:"Test order",d:"Place and cancel",k:"o"},{l:"Market data",k:"d"},{l:"Settled cash",k:"s"}];

  const runVal = async () => {
    sVL(true); sCK([]);
    const R=[{s:"pass",d:"Connected "+at.toUpperCase()},{s:"pass",d:"API enabled"},{s:"pass",d:am==="cash"?"Cash - T+1":"Margin - 4:1"},{s:"pass",d:"US stocks enabled"},{s:cm==="lite"?"pass":"warn",d:cm==="lite"?"Lite $0":"Pro $1/order"},{s:"pass",d:"Order OK"},{s:"pass",d:"Data available"},{s:"pass",d:"Cash verified"}];
    for (let i = 0; i < R.length; i++) {
      await new Promise(r => setTimeout(r, 600));
      sCK(p => [...p, {...VS[i], status: R[i].s, detail: R[i].d}]);
    }
    await new Promise(r => setTimeout(r, 500));
    sVL(false); sVD(true);
  };

  const finish = async () => {
    try {
      const res = await api("/auth/register", { method: "POST", body: { username: un, password: pw, name: nm, account_type: at, commission_plan: cm, account_mode: am } });
      localStorage.setItem("lattice_token", res.token);
      localStorage.setItem("lattice_user", JSON.stringify(res));
      onDone(res);
    } catch (e) { sE(e.message); }
  };

  const SL=["Account","Broker","Validate","Done"];
  return (<div style={PAGE_BG}><div style={{...CARD,width:step===3?520:440}}>

function MiniPlant({ data, width = 200, height = 60 }) {
  if (!data || data.length < 2) return null;
  const vals = data.map(d => d.balance);
  const mn = Math.min(...vals), mx = Math.max(...vals);
  const range = mx - mn || 1;
  const sx = i => (i / (data.length - 1)) * width;
  const sy = v => height - 4 - ((v - mn) / range) * (height - 8);
  const pts = data.map((d, i) => ({ x: sx(i), y: sy(d.balance) }));
  const startV = data[0].balance;
  const hp2 = b => Math.max(0, Math.min(1, 0.5 + ((b - startV) / startV) * 10));
  const clr = hl => `rgb(${Math.round(120-hl*91)},${Math.round(80+hl*145)},${Math.round(50+hl*117)})`;
  const segs = [], lvs = [];
  for (let i = 1; i < pts.length; i++) {
    const hl = hp2(data[i].balance), c = clr(hl);
    const cx = (pts[i-1].x + pts[i].x) / 2;
    segs.push(<path key={`s${i}`} d={`M${pts[i-1].x} ${pts[i-1].y} C${cx} ${pts[i-1].y} ${cx} ${pts[i].y} ${pts[i].x} ${pts[i].y}`} stroke={c} strokeWidth={1 + hl * 0.5} fill="none" opacity={0.4 + hl * 0.5}/>);
    const up = pts[i].y < pts[i-1].y;
    const sz = 3 + hl * 5, px = pts[i].x, py = pts[i].y, hw = sz * 0.35;
    if (up) {
      lvs.push(<path key={`l${i}`} d={`M${px},${py} C${px-hw},${py-sz*0.4} ${px-hw},${py-sz*0.7} ${px},${py-sz} C${px+hw},${py-sz*0.7} ${px+hw},${py-sz*0.4} ${px},${py}Z`} fill={c} opacity={0.3+hl*0.6}/>);
    } else {
      lvs.push(<path key={`l${i}`} d={`M${px},${py} C${px-hw},${py+sz*0.4} ${px-hw},${py+sz*0.7} ${px},${py+sz} C${px+hw},${py+sz*0.7} ${px+hw},${py+sz*0.4} ${px},${py}Z`} fill={c} opacity={0.3+hl*0.5}/>);
    }
  }
  return <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`}>{segs}{lvs}</svg>;
}

  const posKeys = Object.keys(positions);

  const pns = { background: "rgba(15,25,35,0.6)", border: "1px solid rgba(255,255,255,0.04)", borderRadius: 12, padding: "24px 28px" };

  return <div>
    {/* Header banner */}
    <div style={{background:"rgba(251,191,36,0.06)",border:"1px solid rgba(251,191,36,0.15)",borderRadius:12,padding:"16px 24px",marginBottom:20,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <div>
        <div style={{fontSize:14,fontWeight:600,color:"#fbbf24",marginBottom:4}}>BETA TESTING - Crypto Paper Trader</div>
        <div style={{fontSize:11,color:"#94a3b8"}}>No real money. Monitoring BTC + ETH for momentum breakouts (backtested: 40% WR, 1.10 PF over 60 days). RSI strategy removed — lost money in backtest.</div>
      </div>
      <button onClick={toggle} disabled={starting} style={{
        padding:"12px 24px",flexShrink:0,
        background:running?"rgba(248,113,113,0.12)":"linear-gradient(135deg,#f59e0b,#fbbf24)",
        border:running?"1px solid rgba(248,113,113,0.3)":"none",
        borderRadius:10,color:running?"#f87171":"#0a0e17",
        fontSize:12,fontWeight:700,letterSpacing:1.5,cursor:"pointer",fontFamily:"inherit",
      }}>{starting?"...":(running?"STOP BOT":"START PAPER TRADING")}</button>
    </div>

    {/* Stats */}
    <div style={{display:"flex",gap:12,marginBottom:20}}>
      <Stat label="PAPER BALANCE" value={`$${bal.toFixed(2)}`} sub={`Started at $${startCap}`} big/>
      <Stat label="PAPER P&L" value={`${pnl>=0?"+":""}$${pnl.toFixed(2)}`} color={pnl>=0?"#34d399":"#f87171"} sub={`${pnl!==0?((pnl/startCap)*100).toFixed(1)+"%":"0%"}`} big/>
      <Stat label="RECORD" value={`${W}W / ${L}L`} sub={W+L>0?`${(W/(W+L)*100).toFixed(0)}% win rate`:"no trades yet"} big/>
    </div>

    {/* Open positions */}
    {posKeys.length > 0 && <div style={{...pns,marginBottom:20}}>
      <div style={{fontSize:10,color:"#fbbf24",letterSpacing:1.5,marginBottom:12,fontWeight:500}}>OPEN PAPER POSITIONS</div>
      {posKeys.map(ticker => {
        const p = positions[ticker];
        return <div key={ticker} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,0.03)"}}>
          <div>
            <span style={{fontSize:16,fontWeight:600,color:"#e2e8f0"}}>{ticker}</span>
            <span style={{fontSize:11,color:"#475569",marginLeft:12}}>{p.strategy}</span>
          </div>
          <div style={{display:"flex",gap:24}}>
            <div style={{textAlign:"right"}}><div style={{fontSize:10,color:"#475569"}}>ENTRY</div><div style={{fontSize:14,fontWeight:600,color:"#e2e8f0"}}>${p.entry_price?.toLocaleString()}</div></div>
            <div style={{textAlign:"right"}}><div style={{fontSize:10,color:"#475569"}}>TRAIL STOP</div><div style={{fontSize:14,fontWeight:600,color:"#fbbf24"}}>${p.trail_stop?.toLocaleString()}</div></div>
            <div style={{textAlign:"right"}}><div style={{fontSize:10,color:"#475569"}}>RSI</div><div style={{fontSize:14,fontWeight:600,color:"#94a3b8"}}>{p.rsi_at_entry}</div></div>
          </div>
        </div>;
      })}
    </div>}

    <div style={{display:"flex",gap:16,marginBottom:20}}>
      {/* Feed */}
      <div style={{flex:1}}>
        <div style={{fontSize:10,color:"#64748b",letterSpacing:1.5,marginBottom:8,fontWeight:500}}>LIVE FEED</div>
        <div style={{background:"rgba(0,0,0,0.25)",border:"1px solid rgba(255,255,255,0.04)",borderRadius:12,padding:"12px 16px",height:220,overflowY:"auto",fontSize:12,lineHeight:1.7}}>
          {logs.length===0&&<div style={{color:"#475569",padding:20,textAlign:"center"}}>{running?"Monitoring...":"Bot idle - click Start to begin"}</div>}
          {logs.map((l,i) => <div key={i} style={{display:"flex",gap:12}}>
            <span style={{color:"#475569",flexShrink:0}}>{l.time}</span>
            <span style={{color:l.msg&&l.msg.includes("ENTRY")?"#fbbf24":l.msg&&l.msg.includes("EXIT")?(l.msg.includes("+")?  "#34d399":"#f87171"):"#94a3b8"}}>{l.msg}</span>
          </div>)}
        </div>
      </div>

      {/* Strategy info */}
      <div style={{width:280}}>
        <div style={{fontSize:10,color:"#64748b",letterSpacing:1.5,marginBottom:8,fontWeight:500}}>STRATEGY</div>
        <div style={pns}>
          {[
            ["Tickers", "BTC-USD, ETH-USD"],
            ["Interval", "15-min candles"],
            ["Entry", "20-bar high breakout"],
            ["Volume", "1.5x min relative vol"],
            ["Exit", "4.0x ATR trailing stop"],
            ["Time exit", "24 hours max hold"],
            ["Sizing", "50% per trade"],
            ["Backtest", "40% WR, 1.10 PF"],
          ].map(([k,v]) => <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,0.03)"}}>
            <span style={{color:"#94a3b8",fontSize:11}}>{k}</span>
            <span style={{color:"#e2e8f0",fontSize:11,fontWeight:500}}>{v}</span>
          </div>)}
        </div>
      </div>
    </div>

    {/* Trade history */}
    <div style={pns}>
      <div style={{fontSize:10,color:"#64748b",letterSpacing:1.5,marginBottom:12,fontWeight:500}}>PAPER TRADE HISTORY</div>
      {trades.length === 0 && <div style={{color:"#475569",fontSize:12,textAlign:"center",padding:20}}>No paper trades yet</div>}
      {[...trades].reverse().map((t,i) => {
        const pnl2 = t.pnl_usd || 0;
        const win = pnl2 > 0;
        return <div key={i} style={{display:"flex",alignItems:"center",padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.03)",fontSize:12,gap:8}}>
          <span style={{color:"#475569",width:75}}>{t.date}</span>
          <span style={{color:"#fbbf24",fontWeight:600,width:70}}>{t.ticker}</span>
          <span style={{color:"#64748b",width:90,fontSize:10}}>{t.strategy?.replace("_"," ")}</span>
          <span style={{color:t.exit_reason==="trail"?"#34d399":"#94a3b8",width:70,fontSize:10}}>{t.exit_reason}</span>
          <span style={{flex:1,textAlign:"right",fontWeight:600,color:win?"#34d399":"#f87171"}}>{win?"+":""}${pnl2.toFixed?.(2)} ({t.pnl_pct?.toFixed?.(1)}%)</span>
          <span style={{color:"#475569",width:80,textAlign:"right",fontSize:11}}>${t.balance_after?.toFixed?.(2)}</span>
        </div>;
      })}
    </div>
  </div>;
}

// ── Main Dashboard ──────────────────────────────────────────────────
function Dash() {
  const [acct, sA] = useState(null);
  const [trades, sT2] = useState([]);
  const [equity, sEq] = useState([]);
  const [bot, sB] = useState(false);
  const [logs, sL] = useState([]);
  const [tab, sT] = useState("dashboard");
  const ws = useRef(null);

  const fetchData = async () => {
    try {
      const [a, t, e, s] = await Promise.all([api("/account"), api("/trades/recent"), api("/equity"), api("/bot/status")]);
      sA(a); sT2(t); sEq(e); sB(s.running);
      if (s.logs) sL(prev => prev.length === 0 ? s.logs : prev);
    } catch (e) { console.error("Fetch error:", e); }
  };
  useEffect(() => { fetchData(); const iv = setInterval(fetchData, 15000); return () => clearInterval(iv); }, []);

  useEffect(() => {
    try {
      ws.current = new WebSocket(WS_URL);
      ws.current.onmessage = (e) => { const log = JSON.parse(e.data); sL(prev => [...prev.slice(-200), log]); };
      ws.current.onclose = () => { setTimeout(() => { try { ws.current = new WebSocket(WS_URL); } catch {} }, 5000); };
    } catch (e) {}
    return () => { if (ws.current) ws.current.close(); };
  }, []);

  const startBot = async () => { try { await api("/bot/control", { method: "POST", body: { action: "start", live: true } }); sB(true); } catch (e) { alert("Failed: " + e.message); } };
  const stopBot = async () => { try { await api("/bot/control", { method: "POST", body: { action: "stop" } }); sB(false); } catch (e) { alert("Failed: " + e.message); } };

  const W = acct?.wins || 0, L = acct?.losses || 0, tp = acct?.total_pnl_usd || 0, bal = acct?.balance || 0;
  const tabs = ["dashboard","trades","performance","settings","beta","admin"];

  return (<div style={{minHeight:"100vh",background:"linear-gradient(180deg,#0a0e17,#0d1420)",fontFamily:"'JetBrains Mono','SF Mono',monospace",color:"#e2e8f0"}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 28px",borderBottom:"1px solid rgba(255,255,255,0.04)",background:"rgba(10,14,23,0.8)",backdropFilter:"blur(10px)",position:"sticky",top:0,zIndex:10}}>
      <div style={{display:"flex",alignItems:"center",gap:12}}><LatticeIcon/><span style={{fontSize:13,letterSpacing:4,color:"#38bdf8",fontWeight:600}}>LATTICE</span><div style={{width:6,height:6,borderRadius:"50%",background:bot?"#34d399":"#64748b",boxShadow:bot?"0 0 8px #34d399":"none"}}/><span style={{fontSize:11,color:bot?"#34d399":"#64748b"}}>{bot?"RUNNING":"IDLE"}</span></div>
      <div style={{display:"flex",gap:4}}>{tabs.map(t=><button key={t} onClick={()=>sT(t)} style={{padding:"6px 16px",background:tab===t?"rgba(56,189,248,0.1)":"transparent",border:tab===t?"1px solid rgba(56,189,248,0.2)":"1px solid transparent",borderRadius:6,color:tab===t?"#38bdf8":"#64748b",fontSize:11,fontWeight:500,cursor:"pointer",fontFamily:"inherit",letterSpacing:0.5,textTransform:"uppercase"}}>{t}</button>)}</div>
      <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:11,color:"#64748b"}}>IBKR</span><div style={{width:8,height:8,borderRadius:"50%",background:acct?"#34d399":"#64748b"}}/></div>
    </div>
    <div style={{padding:"24px 28px",maxWidth:1200,margin:"0 auto"}}>
      {tab==="dashboard"&&<>
        <div style={{display:"flex",gap:12,marginBottom:20}}><Stat label="ACCOUNT BALANCE" value={`$${bal.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}`} sub="IBKR Net Liquidation" big/><Stat label="TOTAL P&L" value={`${tp>=0?"+":""}$${tp.toFixed(2)}`} color={tp>=0?"#34d399":"#f87171"} sub={`${W+L} trades`} big/><Stat label="RECORD" value={`${W}W / ${L}L`} sub={W+L>0?`${(W/(W+L)*100).toFixed(0)}% win rate`:"no trades yet"} big/></div>
        <div style={{display:"flex",gap:16,marginBottom:20}}>
          <div style={{flex:1}}><div style={{fontSize:10,color:"#64748b",letterSpacing:1.5,marginBottom:8,fontWeight:500}}>LIVE FEED</div><Feed logs={logs}/></div>
          <div style={{width:200,display:"flex",flexDirection:"column",gap:10}}>
            <button onClick={bot?undefined:startBot} disabled={bot} style={{width:"100%",padding:"18px 0",background:bot?"rgba(52,211,153,0.08)":"linear-gradient(135deg,#059669,#34d399)",border:bot?"1px solid rgba(52,211,153,0.2)":"none",borderRadius:12,color:bot?"#34d399":"#0a0e17",fontSize:12,fontWeight:700,letterSpacing:1.5,cursor:bot?"default":"pointer",fontFamily:"inherit",whiteSpace:"pre-line"}}>{bot?"BOT ACTIVE":"START\nDAY TRADING"}</button>
            <button onClick={bot?stopBot:undefined} style={{width:"100%",padding:"14px 0",background:"rgba(248,113,113,0.08)",border:"1px solid rgba(248,113,113,0.15)",borderRadius:12,color:"#f87171",fontSize:11,fontWeight:600,letterSpacing:1,cursor:"pointer",fontFamily:"inherit",opacity:bot?1:0.3}}>KILL SWITCH</button>
          </div>
        </div>
        <div style={{background:"rgba(15,25,35,0.6)",border:"1px solid rgba(255,255,255,0.04)",borderRadius:12,padding:"20px 24px"}}><div style={{fontSize:10,color:"#64748b",letterSpacing:1.5,marginBottom:16,fontWeight:500}}>EQUITY CURVE</div><PlantEquityCurve data={equity}/></div>
      </>}
      {tab==="trades"&&<div style={{background:"rgba(15,25,35,0.6)",border:"1px solid rgba(255,255,255,0.04)",borderRadius:12,overflow:"hidden"}}><div style={{display:"flex",padding:"12px 16px",fontSize:10,color:"#475569",letterSpacing:1,borderBottom:"1px solid rgba(255,255,255,0.04)"}}><div style={{width:80}}>DATE</div><div style={{width:55}}>TICKER</div><div style={{width:70}}>ENTRY</div><div style={{width:70}}>EXIT</div><div style={{width:55}}>TYPE</div><div style={{flex:1,textAlign:"right"}}>P&L</div></div>{trades.length===0&&<div style={{padding:40,textAlign:"center",color:"#475569",fontSize:12}}>No trades yet</div>}{[...trades].reverse().map((t,i)=><TRow key={i} t={t}/>)}</div>}
      {tab==="performance"&&<>
        <div style={{display:"flex",gap:12,marginBottom:20}}><Stat label="WIN RATE" value={W+L>0?`${(W/(W+L)*100).toFixed(0)}%`:"--"} color="#34d399"/><Stat label="AVG WIN" value={W>0?`+$${(trades.filter(t=>(t.pnl_usd||t.pnl||0)>0).reduce((s,t)=>s+(t.pnl_usd||t.pnl||0),0)/W).toFixed(2)}`:"--"} color="#34d399"/><Stat label="AVG LOSS" value={L>0?`-$${Math.abs(trades.filter(t=>(t.pnl_usd||t.pnl||0)<=0).reduce((s,t)=>s+(t.pnl_usd||t.pnl||0),0)/L).toFixed(2)}`:"--"} color="#f87171"/><Stat label="DRAWDOWN" value={`${(acct?.max_drawdown_pct||0).toFixed(1)}%`}/></div>
        <div style={{background:"rgba(15,25,35,0.6)",border:"1px solid rgba(255,255,255,0.04)",borderRadius:12,padding:"20px 24px"}}><div style={{fontSize:10,color:"#64748b",letterSpacing:1.5,marginBottom:16,fontWeight:500}}>GROWTH</div><PlantEquityCurve data={equity} height={350}/></div>
        <div style={{marginTop:16,background:"rgba(15,25,35,0.6)",border:"1px solid rgba(255,255,255,0.04)",borderRadius:12,padding:"20px 24px"}}><div style={{fontSize:10,color:"#64748b",letterSpacing:1.5,marginBottom:12,fontWeight:500}}>AUTO-TUNE</div><div style={{fontSize:12,color:"#94a3b8",marginBottom:12}}>{W+L} trades logged - need 50 for first tune</div><div style={{height:4,background:"rgba(255,255,255,0.05)",borderRadius:2,overflow:"hidden"}}><div style={{width:`${Math.min(100,(W+L)/50*100)}%`,height:"100%",background:"#38bdf8",borderRadius:2}}/></div></div>
      </>}
      {tab==="settings"&&<SettingsTab bal={bal} bot={bot}/>}
      {tab==="beta"&&<BetaTab/>}
      {tab==="admin"&&<AdminTab/>}
    </div>
  </div>);
}

// ── App Root ────────────────────────────────────────────────────────
function App() {
  const backendOk = useBackendStatus();
  const [s,sS] = useState(() => localStorage.getItem("lattice_token") ? "dash" : "land");
  const [user,sU] = useState(() => { try { return JSON.parse(localStorage.getItem("lattice_user")); } catch { return null; } });

  if (!backendOk) return <NoBackend/>;
  if (s==="land") return <Landing onLogin={()=>sS("sign")} onCreate={()=>sS("setup")}/>;
  if (s==="sign") return <SignIn onLogin={u=>{sU(u);sS("dash")}} onBack={()=>sS("land")}/>;
  if (s==="setup") return <Setup onDone={u=>{sU(u);sS("dash")}} onBack={()=>sS("land")}/>;
  return <Dash/>;
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
